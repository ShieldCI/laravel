name: Tests

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 (PHP 8.1–8.3)
          - php: '8.1'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.2'
            laravel: '10.*'
            testbench: '^8.0'
          - php: '8.3'
            laravel: '10.*'
            testbench: '^8.0'
          # Laravel 11 (PHP 8.2–8.4)
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '11.*'
            testbench: '^9.0'
          # Laravel 12 (PHP 8.2–8.5)
          - php: '8.2'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.5'
            laravel: '12.*'
            testbench: '^10.0'
          # Laravel 13 (PHP 8.3–8.5)
          - php: '8.3'
            laravel: '13.*'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '13.*'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, dom, curl, libxml, zip, pcntl
          coverage: xdebug

      - name: Install Composer dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
